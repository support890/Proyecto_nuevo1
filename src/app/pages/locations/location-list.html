<p-toast />
<p-confirmDialog />

<div class="card">
    <!-- Encabezado con botones -->
    <div class="flex justify-between items-start mb-4">
        <div>
            <h2 class="text-3xl font-bold text-surface-900 dark:text-surface-0 m-0">Gestión de ubicaciones</h2>
        </div>
        <div class="flex gap-3 items-center">
            <p-button label="Nueva Ubicación" icon="pi pi-plus" (onClick)="createNewLocation()"
                styleClass="p-button-success">
            </p-button>
            <p-button label="Generador" icon="pi pi-cog" (onClick)="openGenerator()" styleClass="p-button-info">
            </p-button>
            <p-iconfield>
                <p-inputicon styleClass="pi pi-search" />
                <input pInputText type="text" [(ngModel)]="searchValue" (input)="onSearch()"
                    placeholder="Search keyword" style="width: 250px" />
                <p-inputicon *ngIf="searchValue" styleClass="pi pi-times cursor-pointer" (click)="clearSearch()" />
            </p-iconfield>
        </div>
    </div>

    <!-- Tabla -->
    <p-table [value]="filteredLocations" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10, 20, 50]"
        [showCurrentPageReport]="true"
        currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} ubicaciones"
        styleClass="p-datatable-gridlines">

        <ng-template pTemplate="header">
            <tr>
                <th style="width:3rem"
                    class="text-xs uppercase text-surface-500 font-bold bg-surface-50 dark:bg-surface-800">Actions</th>
                <th pSortableColumn="zone" style="width: 12%">
                    Zone <p-sortIcon field="zone" />
                </th>
                <th pSortableColumn="storageName" style="width: 18%">
                    Location <p-sortIcon field="storageName" />
                </th>
                <th style="width: 12%">Bin Qty</th>
                <th style="width: 18%">Content</th>
                <th pSortableColumn="category" style="width: 15%">
                    Category <p-sortIcon field="category" />
                </th>
                <th pSortableColumn="type" style="width: 12%">
                    Type <p-sortIcon field="type" />
                </th>
            </tr>
        </ng-template>

        <ng-template pTemplate="body" let-location>
            <tr>
                <td>
                    <p-button icon="pi pi-ellipsis-v" [text]="true" [rounded]="true" size="small"
                        (onClick)="menu.toggle($event); menuItems = getMenuItems(location)">
                    </p-button>
                </td>
                <td>{{ location.zone }}</td>
                <td>
                    <span class="font-semibold text-primary">{{ location.storageName }}</span>
                </td>
                <td class="text-center">
                    <p-button *ngIf="location.binQty > 0" [label]="location.binQty.toString()" icon="pi pi-box"
                        (onClick)="viewBins(location.id!)" [text]="true" severity="info" size="small">
                    </p-button>
                    <span *ngIf="location.binQty === 0" class="text-surface-400">0</span>
                </td>
                <td>{{ location.content || '-' }}</td>
                <td>
                    <p-tag [value]="location.category" [severity]="getCategoryClass(location.category)">
                    </p-tag>
                </td>
                <td>
                    <p-tag [value]="location.type" [severity]="getTypeClass(location.type)" [rounded]="true">
                    </p-tag>
                </td>
            </tr>
        </ng-template>

        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="7" class="text-center py-8">
                    <div class="flex flex-col items-center gap-3">
                        <i class="pi pi-inbox text-4xl text-gray-400"></i>
                        <p class="text-gray-500">No se encontraron ubicaciones</p>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>
