<p-toast />

<div class="card">
    <div class="flex items-center mb-6">
        <p-button 
            icon="pi pi-arrow-left" 
            [text]="true"
            [rounded]="true"
            (onClick)="goBack()"
            styleClass="mr-4">
        </p-button>
        <div>
            <h2 class="text-3xl font-bold text-surface-900 dark:text-surface-0 m-0">
                Generador de Ubicaciones
            </h2>
            <p class="text-surface-600 dark:text-surface-400 mt-2">
                Crea múltiples ubicaciones de forma automática
            </p>
        </div>
    </div>

    <div class="grid grid-cols-12 gap-6">
        <!-- Información Principal -->
        <div class="col-span-12 lg:col-span-8">
            <p-card header="Parámetros de Generación">
                <div class="grid grid-cols-12 gap-4">
                    <!-- Zone y Category -->
                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Zone
                        </label>
                        <input 
                            pInputText 
                            [(ngModel)]="generatorParams.zone" 
                            placeholder="Ingrese la zona"
                            class="w-full" />
                    </div>

                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Category <span class="text-red-500">*</span>
                        </label>
                        <p-dropdown 
                            [options]="categoryOptions"
                            [(ngModel)]="generatorParams.category"
                            placeholder="Select category"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full"
                            appendTo="body">
                        </p-dropdown>
                    </div>

                    <!-- Type y Area -->
                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Type <span class="text-red-500">*</span>
                        </label>
                        <p-dropdown 
                            [options]="typeOptions"
                            [(ngModel)]="generatorParams.type"
                            placeholder="Select type"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full"
                            appendTo="body">
                        </p-dropdown>
                    </div>

                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Area <span class="text-red-500">*</span>
                        </label>
                        <input 
                            pInputText 
                            [(ngModel)]="generatorParams.area" 
                            placeholder="Ej: A1"
                            class="w-full" />
                    </div>

                    <!-- Row Min y Row Max -->
                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Row Min <span class="text-red-500">*</span>
                        </label>
                        <p-inputNumber 
                            [(ngModel)]="generatorParams.rowMin"
                            [min]="1"
                            [showButtons]="true"
                            buttonLayout="horizontal"
                            decrementButtonClass="p-button-outlined"
                            incrementButtonClass="p-button-outlined"
                            incrementButtonIcon="pi pi-plus"
                            decrementButtonIcon="pi pi-minus"
                            styleClass="w-full">
                        </p-inputNumber>
                    </div>

                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Row Max <span class="text-red-500">*</span>
                        </label>
                        <p-inputNumber 
                            [(ngModel)]="generatorParams.rowMax"
                            [min]="1"
                            [showButtons]="true"
                            buttonLayout="horizontal"
                            decrementButtonClass="p-button-outlined"
                            incrementButtonClass="p-button-outlined"
                            incrementButtonIcon="pi pi-plus"
                            decrementButtonIcon="pi pi-minus"
                            styleClass="w-full">
                        </p-inputNumber>
                    </div>

                    <!-- Bay Min y Bay Max -->
                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Bay Min <span class="text-red-500">*</span>
                        </label>
                        <p-inputNumber 
                            [(ngModel)]="generatorParams.bayMin"
                            [min]="1"
                            [showButtons]="true"
                            buttonLayout="horizontal"
                            decrementButtonClass="p-button-outlined"
                            incrementButtonClass="p-button-outlined"
                            incrementButtonIcon="pi pi-plus"
                            decrementButtonIcon="pi pi-minus"
                            styleClass="w-full">
                        </p-inputNumber>
                    </div>

                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Bay Max <span class="text-red-500">*</span>
                        </label>
                        <p-inputNumber 
                            [(ngModel)]="generatorParams.bayMax"
                            [min]="1"
                            [showButtons]="true"
                            buttonLayout="horizontal"
                            decrementButtonClass="p-button-outlined"
                            incrementButtonClass="p-button-outlined"
                            incrementButtonIcon="pi pi-plus"
                            decrementButtonIcon="pi pi-minus"
                            styleClass="w-full">
                        </p-inputNumber>
                    </div>

                    <!-- Level Min y Level Max -->
                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Level Min <span class="text-red-500">*</span>
                        </label>
                        <p-dropdown 
                            [(ngModel)]="generatorParams.levelMin"
                            [options]="[
                                {label: '1', value: 1},
                                {label: '2', value: 2},
                                {label: '3', value: 3},
                                {label: '4', value: 4},
                                {label: '5', value: 5}
                            ]"
                            placeholder="Select level"
                            optionLabel="label"
                            optionValue="value"
                            [showClear]="true"
                            styleClass="w-full"
                            appendTo="body">
                        </p-dropdown>
                    </div>

                    <div class="col-span-12 md:col-span-6">
                        <label class="block mb-2 font-semibold">
                            Level Max <span class="text-red-500">*</span>
                        </label>
                        <p-dropdown 
                            [(ngModel)]="generatorParams.levelMax"
                            [options]="[
                                {label: '1', value: 1},
                                {label: '2', value: 2},
                                {label: '3', value: 3},
                                {label: '4', value: 4},
                                {label: '5', value: 5}
                            ]"
                            placeholder="Select level"
                            optionLabel="label"
                            optionValue="value"
                            [showClear]="true"
                            styleClass="w-full"
                            appendTo="body">
                        </p-dropdown>
                    </div>

                    <!-- Content Field -->
                    <div class="col-span-12">
                        <label class="block mb-2 font-semibold">
                            Content
                        </label>
                        <input 
                            pInputText 
                            [(ngModel)]="generatorParams.content" 
                            placeholder="Descripción del contenido para todas las ubicaciones (ej: RAPIDO, DDD)"
                            class="w-full" />
                    </div>
                </div>
            </p-card>
        </div>

        <!-- Panel Lateral -->
        <div class="col-span-12 lg:col-span-4">
            <p-card header="Resumen">
                <div class="flex items-center gap-2 mb-4">
                    <i class="pi pi-info-circle text-primary text-xl"></i>
                    <span class="font-semibold">Generación Masiva</span>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="text-center p-3 surface-50 dark:surface-800 rounded-lg">
                        <div class="text-3xl font-bold text-primary mb-1">{{ totalLocations }}</div>
                        <div class="text-sm text-surface-600 dark:text-surface-400">Total Locations</div>
                    </div>
                    <div class="text-center p-3 surface-50 dark:surface-800 rounded-lg">
                        <div class="text-3xl font-bold text-primary mb-1">{{ totalRows }}</div>
                        <div class="text-sm text-surface-600 dark:text-surface-400">Rows</div>
                    </div>
                    <div class="text-center p-3 surface-50 dark:surface-800 rounded-lg">
                        <div class="text-3xl font-bold text-primary mb-1">{{ totalBays }}</div>
                        <div class="text-sm text-surface-600 dark:text-surface-400">Bays</div>
                    </div>
                    <div class="text-center p-3 surface-50 dark:surface-800 rounded-lg">
                        <div class="text-3xl font-bold text-primary mb-1">{{ totalLevels }}</div>
                        <div class="text-sm text-surface-600 dark:text-surface-400">Levels</div>
                    </div>
                </div>
            </p-card>

            <div class="flex flex-col gap-2 mt-4">
                <p-button 
                    label="Generar Ubicaciones"
                    icon="pi pi-check"
                    (onClick)="generateLocations()"
                    styleClass="w-full"
                    severity="success">
                </p-button>
                <p-button 
                    label="Cancelar" 
                    icon="pi pi-times"
                    (onClick)="goBack()"
                    styleClass="w-full"
                    [outlined]="true">
                </p-button>
            </div>
        </div>
    </div>
</div>
