<p-toast />

<p-dialog
    [(visible)]="visible"
    (visibleChange)="visibleChange.emit($event)"
    [header]="isEditMode ? 'Editar Bin' : 'Crear Nuevo Bin'"
    [modal]="true"
    [style]="{ width: '420px' }"
    [draggable]="false"
    [resizable]="false">

    <div class="flex flex-col gap-4 pt-2">

        <div>
            <label class="block mb-2 font-semibold">
                Bin Name <span class="text-red-500">*</span>
            </label>
            <input
                pInputText
                [(ngModel)]="binData.binName"
                placeholder="Ej: BIN-001"
                class="w-full" />
        </div>

        <div>
            <label class="block mb-2 font-semibold">Capacity</label>
            <p-inputNumber
                [(ngModel)]="binData.capacity"
                [min]="0"
                [showButtons]="true"
                buttonLayout="horizontal"
                decrementButtonClass="p-button-outlined"
                incrementButtonClass="p-button-outlined"
                incrementButtonIcon="pi pi-plus"
                decrementButtonIcon="pi pi-minus"
                placeholder="Capacidad máxima"
                styleClass="w-full">
            </p-inputNumber>
        </div>

        <div>
            <label class="block mb-2 font-semibold">Current Stock</label>
            <p-inputNumber
                [(ngModel)]="binData.currentStock"
                [min]="0"
                [disabled]="!isEditMode"
                styleClass="w-full">
            </p-inputNumber>
            <small *ngIf="!isEditMode" class="text-surface-500">El stock inicial siempre es 0</small>
        </div>

        <div class="flex items-center gap-3">
            <p-inputSwitch [(ngModel)]="binData.active"></p-inputSwitch>
            <label>{{ binData.active ? 'Activo' : 'Inactivo' }}</label>
        </div>

    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-2">
            <p-button
                label="Cancelar"
                icon="pi pi-times"
                (onClick)="closeDialog()"
                [outlined]="true">
            </p-button>
            <p-button
                [label]="isEditMode ? 'Actualizar' : 'Crear'"
                icon="pi pi-check"
                (onClick)="saveBin()"
                severity="success"
                [loading]="saving">
            </p-button>
        </div>
    </ng-template>
</p-dialog>
